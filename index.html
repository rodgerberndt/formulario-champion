    <script>
      (function () {
        try {
          var LOCK_CLASS = '__locked__';
          var STYLE_ID = '__scroll_lock__';
          var SESSION_KEY = 'champion_scroll_bootstrap_v3';
          var RELOAD_KEY = 'champion_post_load_reload_v1';
          var LOCK_TIMEOUT_MS = 550;
          var releaseTimer = null;
          var pinTimer = null;
          var rafId = null;
          var released = false;
          var firstLoadInTab = false;

          try {
            firstLoadInTab = sessionStorage.getItem(SESSION_KEY) !== '1';
            sessionStorage.setItem(SESSION_KEY, '1');
          } catch (e) {}

          var ensureStyle = function () {
            if (document.getElementById(STYLE_ID)) return;
            var style = document.createElement('style');
            style.id = STYLE_ID;
            style.textContent =
              'html.' + LOCK_CLASS + ',body.' + LOCK_CLASS + '{overflow:hidden!important;height:100%!important;}' +
              'body.' + LOCK_CLASS + '{position:fixed!important;inset:0!important;width:100%!important;touch-action:none!important;}';
            document.documentElement.appendChild(style);
          };

          var resetToTop = function () {
            try {
              if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
              if (window.location.hash) {
                history.replaceState(null, '', window.location.pathname + window.location.search);
              }
              window.scrollTo(0, 0);
              if (document.scrollingElement) document.scrollingElement.scrollTop = 0;
              document.documentElement.scrollTop = 0;
              if (document.body) document.body.scrollTop = 0;
            } catch (e) {}
          };

          var applyLock = function () {
            ensureStyle();
            document.documentElement.classList.add(LOCK_CLASS);
            if (document.body) document.body.classList.add(LOCK_CLASS);
          };

          var clearLock = function () {
            document.documentElement.classList.remove(LOCK_CLASS);
            if (document.body) document.body.classList.remove(LOCK_CLASS);
          };

          var stopPinning = function () {
            if (pinTimer) {
              clearInterval(pinTimer);
              pinTimer = null;
            }
            if (rafId) {
              cancelAnimationFrame(rafId);
              rafId = null;
            }
          };

          var startPinning = function () {
            stopPinning();
            var tick = function () {
              if (released) return;
              resetToTop();
              rafId = requestAnimationFrame(tick);
            };
            pinTimer = setInterval(resetToTop, 50);
            tick();
          };

          var release = function () {
            if (released) return;
            released = true;
            stopPinning();
            clearLock();
            resetToTop();
          };

          var scheduleRelease = function (delay) {
            if (releaseTimer) clearTimeout(releaseTimer);
            releaseTimer = setTimeout(release, delay);
          };

          var boot = function () {
            released = false;
            applyLock();
            resetToTop();
            startPinning();
            scheduleRelease(LOCK_TIMEOUT_MS);
          };

          boot();

          if (!document.body) {
            document.addEventListener('DOMContentLoaded', function () {
              if (!released) document.body.classList.add(LOCK_CLASS);
              resetToTop();
            }, { once: true });
          }

          window.addEventListener('load', function () {
            scheduleRelease(firstLoadInTab ? 120 : 80);
            try {
              var isLanding = window.location.pathname === '/' || window.location.pathname === '/index.html';
              if (isLanding && sessionStorage.getItem(RELOAD_KEY) !== '1') {
                sessionStorage.setItem(RELOAD_KEY, '1');
                setTimeout(function () {
                  window.location.reload();
                }, 1);
              }
            } catch (e) {}
          }, { once: true });

          window.addEventListener('pageshow', function (event) {
            if (!event.persisted) return;
            boot();
            scheduleRelease(120);
          });
        } catch (e) {}
      })();
    </script>

    <!-- Early landing_hit (sendBeacon) — dispara ANTES do React/JS app, para capturar 100% das visitas -->
    <script>
      (function(){
        try {
          if (sessionStorage.getItem('champion_landing_hit_fired') === '1') return;
          var url = 'https://troqylihudenqjsxsnwy.supabase.co/functions/v1/landing-hit';
          var sp = new URLSearchParams(window.location.search);
          var get = function(k){ var v = sp.get(k); return (v && v.indexOf('{{') === -1) ? v : null; };
          // Gera/recupera session_id (UUID v4) ANTES do React, para garantir unique_sessions correto
          var sid = null;
          try {
            sid = localStorage.getItem('champion_session_id');
            if (!sid || !/^[0-9a-f-]{36}$/i.test(sid)) {
              if (window.crypto && window.crypto.randomUUID) {
                sid = window.crypto.randomUUID();
              } else {
                sid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c){
                  var r = Math.random()*16|0, v = c=='x' ? r : (r&0x3|0x8); return v.toString(16);
                });
              }
              localStorage.setItem('champion_session_id', sid);
            }
          } catch(e){}
          var cid = null;
          try {
            var raw = sessionStorage.getItem('champion_click_id');
            if (raw) { var p = JSON.parse(raw); cid = p && p.id ? p.id : null; }
          } catch(e){}
          var payload = {
            session_id: sid,
            click_id: cid,
            path: window.location.pathname + window.location.search,
            referrer: document.referrer || null,
            utm_source: get('utm_source'),
            utm_medium: get('utm_medium'),
            utm_campaign: get('utm_campaign'),
            utm_content: get('utm_content'),
            utm_term: get('utm_term'),
            fbclid: get('fbclid'),
            gclid: get('gclid'),
            ttclid: get('ttclid')
          };
          var blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
          var sent = false;
          if (navigator.sendBeacon) { sent = navigator.sendBeacon(url, blob); }
          if (!sent) {
            fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload), keepalive: true }).catch(function(){});
          }
          sessionStorage.setItem('champion_landing_hit_fired', '1');
        } catch(e) {}
      })();
    </script>
    <script>
      // Eagerly unregister service workers to prevent stale React runtime
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          }).catch(function(){});
        }
      } catch(e) {}
      try {
        if (typeof caches !== 'undefined') {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          }).catch(function(){});
        }
      } catch(e) {}
    </script>
